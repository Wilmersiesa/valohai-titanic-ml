- step:
    name: Preprocess data
    image: amancevice/pandas:latest
    command:
      - pip install scikit-learn --timeout 10 || true
      - python src/preprocess.py
    inputs:
      - name: train.csv
        default: https://raw.githubusercontent.com/datasciencedojo/datasets/master/titanic.csv

- step:
    name: Train model
    image: amancevice/pandas:latest
    command:
      - pip install scikit-learn joblib --timeout 10 || true
      - python src/train.py

- step:
    name: Evaluate model
    image: amancevice/pandas:latest
    command:
      - pip install scikit-learn joblib --timeout 10 || true
      - python src/evaluate.py
